name: Release Desktop App

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump for this release
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - none

permissions:
  contents: write

concurrency:
  group: desktop-release-main
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish Windows update
    runs-on: windows-latest
    if: github.event_name == 'workflow_dispatch' || (!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[skip release]'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure release git identity
        run: |
          git config user.name "vidyatech-release-bot"
          git config user.email "actions@github.com"

      - name: Bump version and tag release
        id: version
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $bump = "${{ github.event_name == 'workflow_dispatch' && inputs.bump || 'patch' }}"

          if ($bump -ne "none") {
            npm version $bump --no-git-tag-version
          }

          $version = node -p "require('./package.json').version"
          $tag = "v$version"

          git add package.json package-lock.json
          git diff --cached --quiet
          $hasVersionChanges = $LASTEXITCODE -ne 0
          if ($hasVersionChanges) {
            git commit -m "chore(release): $tag [skip ci]"
            git push origin HEAD:main
          }

          git rev-parse --verify $tag 2>$null
          $tagExists = $LASTEXITCODE -eq 0
          if ($tagExists) {
            Write-Host "Tag $tag already exists locally."
          } else {
            git tag $tag
            git push origin $tag
          }

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build installer and publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
        run: npm run release

      - name: Upload build artifacts to workflow
        uses: actions/upload-artifact@v4
        with:
          name: VidyaTech-Reception-${{ steps.version.outputs.version }}
          path: |
            release-desktop/*.exe
            release-desktop/*.blockmap
            release-desktop/latest.yml
