<!doctype html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#060a12" />
  <script>
    (() => {
      try {
        const savedTheme = localStorage.getItem("theme");
        const userSelectedTheme = localStorage.getItem("theme_user_selected") === "true";
        document.documentElement.classList.toggle("dark", !userSelectedTheme || savedTheme === "dark");
      } catch (_error) {
        document.documentElement.classList.add("dark");
      }
    })();
  </script>
  <link rel="icon" type="image/svg+xml" href="/vidyatech-icon.svg" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <title>VidyaTech | School Management Software India</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
